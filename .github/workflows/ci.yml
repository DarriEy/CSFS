name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # pandas is an optional runtime extra, but installed in CI so the
        # DataFrame query paths are tested and type-checked.
        run: pip install -e ".[dev,api,pandas]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/csfs/

      - name: Test
        # Tests are hermetic: tests/conftest.py blocks real network access, so
        # connectors must mock their HTTP. `-m "not network"` skips any test
        # explicitly opted into reaching a real upstream.
        run: pytest tests/ -v --tb=short -m "not network"
