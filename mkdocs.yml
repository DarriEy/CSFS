site_name: CSFS — Community Streamflow Service
site_description: Live acquisition and harmonization of global streamflow observations
site_url: https://darriey.github.io/CSFS/
repo_url: https://github.com/DarriEy/CSFS
repo_name: DarriEy/CSFS
copyright: Copyright &copy; 2026 Darri Eythorsson — GPL-3.0-or-later

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - CLI: cli.md
  - Python API: python-api.md
  - Provider Catalog: catalog.md
  - SYMFLUENCE Integration: symfluence.md
  - Architecture: architecture.md
  - API Reference: reference.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
