# CSFS Global Streamflow Provider Inventory
#
# Sources: EStreams notebook D catalogue + independent survey.
# Each entry documents a known streamflow data source, its API capabilities,
# access model, and readiness for live acquisition.
#
# status values:
#   implemented  — connector exists in csfs/connectors/
#   planned      — stable API, high priority for implementation
#   research     — API exists but needs investigation
#   manual       — no API; requires scraping or manual download
#   fallback     — community/research dataset for gap-filling

# ──────────────────────────────────────────────
#  TIER 1 — Stable APIs, high-priority targets
# ──────────────────────────────────────────────

- slug: usgs
  name: USGS National Water Information System (NWIS)
  country: US
  region: north_america
  api_type: rest
  base_url: https://waterservices.usgs.gov/nwis
  endpoints:
    instantaneous: /iv/
    daily: /dv/
    sites: /site/
  format: [json, waterml2, rdb]
  access: open
  realtime: true
  realtime_latency: 15min
  stations: ~10000
  stability: stable
  license: public_domain
  status: implemented
  notes: Gold standard. Discharge param 00060 (cfs), convert to m3/s.

- slug: uk_ea
  name: UK Environment Agency Hydrology API
  country: GB
