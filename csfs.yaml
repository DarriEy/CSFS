# CSFS provider configuration
# Paths are relative to the project root.

providers:
  # -- Auto-downloading datasets --
  # These connectors download + cache their dataset on first use, into
  # `data/datasets/<slug>/` by default. No config is required.
  #   - To use a pre-downloaded copy, set `data_dir:` (this disables the
  #     auto-download).
  #   - To disable auto-download entirely, set `auto_download: false`.
  #   - To change the cache location, set `datasets_dir:` (default
  #     `data/datasets`).
  # NOTE: Caravan is ~12.5 GB and LamaH-CE ~1.5 GB — the first fetch that
  # touches them will download the full archive.
  #
  # caravan:           {}   # auto-downloads (~12.5 GB)
  # israel_caravan:    {}   # auto-downloads (~300 MB)
  # lamah_ce:          {}   # auto-downloads (~1.5 GB)
  # iceland_lamahice:  {}   # auto-downloads (~636 MB)
  # gsim:              {}   # auto-downloads (~970 MB)
  # panama_stri:       {}   # auto-downloads (~370 MB)

  # -- Manual-download datasets --
  # No public auto-download; fetch the files (see `csfs download-data --list`)
  # and point `data_dir` at them.
  grdc:
    data_dir: data/datasets/grdc

  bolivia_ine:
    data_dir: data/datasets/bolivia_ine

  spain_cedex:
    data_dir: data/datasets/spain_cedex

  vietnam_mekong:
    data_dir: data/datasets/vietnam_mekong

  ca_discharge:
    data_dir: data/datasets/ca_discharge

  sierem:
    data_dir: data/datasets/sierem

  adhi:
    data_dir: data/datasets/adhi

  pakistan_wapda:
    data_dir: data/datasets/pakistan_wapda

  # -- API keys --
  # norway_nve: requires a free NVE HydAPI key (register at https://hydapi.nve.no/).
  #   By default the connector reads the key from ~/.hydapi (the raw key on a
  #   single line — keep it out of this tracked file). To override, uncomment:
  # norway_nve:
  #   api_key: ""

  # danube_his:
  #   api_token: ""  # Register at https://www.danubehis.org
